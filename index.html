<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Firebase 3D FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }
        /* 極簡液態玻璃 UI */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
            backdrop-filter: blur(2px) brightness(1.15) contrast(1.1);
            border-top: 1px solid rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            color: #fff; font-family: sans-serif;
            pointer-events: none; z-index: 10; min-width: 200px;
        }
        /* 動態血條 */
        #hp-container {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 4px; margin-top: 15px; overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        #hp-bar {
            width: 100%; height: 100%; background: #4ade80;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.8); color: white; z-index: 20; cursor: pointer;
            font-family: sans-serif;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-panel">
        <h3 style="margin:0 0 10px 0; font-weight: 500; font-size: 16px;">連線狀態</h3>
        <div id="statusText" style="font-size: 14px; margin-bottom: 10px;">系統初始化中...</div>
        <div style="font-size: 12px; color: #ccc;">生命值 (HP)</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
    </div>
    <div id="instructions">
        <h1 style="font-weight: 300;">點擊畫面開始</h1>
        <p style="color: #aaa;">WASD 移動 | 空白鍵 跳躍 | 左鍵 射擊</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ==========================================
        // 1. Firebase 初始化
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD1lrv2JndZQQuWFqlMKcskEvT1sELjlno",
            authDomain: "gun-game-64749.firebaseapp.com",
            databaseURL: "https://gun-game-64749-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gun-game-64749",
            storageBucket: "gun-game-64749.firebasestorage.app",
            messagingSenderId: "614674178389",
            appId: "1:614674178389:web:a86a15aa6b835b6633cfdc",
            measurementId: "G-YJ4WRL03ZX"
        };

        let db = null, myUserId = null, myPlayerRef = null;

        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
            myPlayerRef = db.ref('players/' + myUserId);
            myPlayerRef.onDisconnect().remove();
            myPlayerRef.set({ x: 0, y: 1.6, z: 0, hp: 100 });
            document.getElementById('statusText').innerHTML = "連線成功";
        } catch (error) {
            console.warn("⚠️ 啟動離線測試模式");
            document.getElementById('statusText').innerHTML = "<span style='color:#fbd38d;'>離線測試模式</span>";
        }

        // ==========================================
        // 2. Three.js 場景與物理參數設定
        // ==========================================
        let camera, scene, renderer, controls;
        let remotePlayers = {};
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        const raycaster = new THREE.Raycaster();
        let isDead = false;

        init3D();
        animate();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 0, 50); 
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            const light = new THREE.HemisphereLight(0xeeeeff, 0x444455, 1);
            scene.add(light);

            const floorGeometry = new THREE.PlaneGeometry(200, 200, 40, 40);
            const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x333333, wireframe: true });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const boxGeo = new THREE.BoxGeometry(2, 2, 2);
            const boxMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
            for(let i=0; i<10; i++) {
                let box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set((Math.random() - 0.5) * 40, 1, (Math.random() - 0.5) * 40);
                scene.add(box);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');
            
            instructions.addEventListener('click', () => { if(!isDead) controls.lock(); });
            controls.addEventListener('lock', () => instructions.style.display = 'none');
            controls.addEventListener('unlock', () => instructions.style.display = 'flex');
            scene.add(controls.getObject());

            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump === true && !isDead) velocity.y += 250; canJump = false; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });

            document.addEventListener('mousedown', (e) => {
                if (controls.isLocked && e.button === 0 && !isDead) shoot();
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ==========================================
        // 3. 射擊邏輯與後座力
        // ==========================================
        function shoot() {
            camera.rotation.x += 0.02;

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targetMeshes = Object.values(remotePlayers).map(p => p.mesh);
            const intersects = raycaster.intersectObjects(targetMeshes);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === hitMesh);
                
                if (hitId && db) {
                    db.ref('players/' + hitId).once('value').then(snap => {
                        let currentHp = snap.val().hp;
                        if(currentHp > 0) {
                            db.ref('players/' + hitId).update({ hp: Math.max(0, currentHp - 25) });
                        }
                    });
                }
            }
        }

        // ==========================================
        // 4. 動畫迴圈與重力物理計算
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked && !isDead) {
                const delta = (time - prevTime) / 1000;
                
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                
                velocity.y -= 9.8 * 80.0 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true; 
                }

                if (db && (Math.abs(velocity.x) > 0.1 || Math.abs(velocity.z) > 0.1 || Math.abs(velocity.y) > 0.1)) {
                    myPlayerRef.update({
                        x: controls.getObject().position.x,
                        y: controls.getObject().position.y,
                        z: controls.getObject().position.z
                    });
                }
            }
            prevTime = time;
            renderer.render(scene, camera);
        }

        // ==========================================
        // 5. Firebase 資料庫監聽與 UI 更新
        // ==========================================
        function updateUI(hp) {
            const hpBar = document.getElementById('hp-bar');
            hpBar.style.width = hp + '%';
            if (hp > 50) hpBar.style.background = '#4ade80';
            else if (hp > 25) hpBar.style.background = '#facc15';
            else hpBar.style.background = '#f87171';
        }

        if (db) {
            db.ref('players').on('value', (snapshot) => {
                const playersData = snapshot.val() || {};
                let playerCount = Object.keys(playersData).length;
                
                if(!isDead) {
                    document.getElementById('statusText').innerHTML = 
                        playerCount >= 2 ? "對手已連線，<span style='color:#4ade80'>戰鬥開始</span>" : "等待對手加入...";
                }

                if (playersData[myUserId]) {
                    let myHp = playersData[myUserId].hp;
                    updateUI(myHp);
                    
                    if (myHp <= 0 && !isDead) {
                        isDead = true;
                        controls.unlock();
                        document.getElementById('statusText').innerHTML = "<span style='color:#f87171; font-weight:bold;'>你被擊殺了！</span>";
                        document.getElementById('instructions').innerHTML = "<h1 style='color:#f87171'>YOU DIED</h1><p>請重新整理網頁復活</p>";
                    }
                }

                Object.keys(playersData).forEach(id => {
                    if (id === myUserId) return;
                    const data = playersData[id];
                    
                    if (data.hp <= 0 && remotePlayers[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                        if(!isDead) document.getElementById('statusText').innerHTML = "<span style='color:#4ade80;'>擊殺敵人！</span>";
                        return;
                    }

                    if (data.hp > 0) {
                        if (!remotePlayers[id]) {
                            const geo = new THREE.BoxGeometry(1, 2, 1);
                            const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
                            const mesh = new THREE.Mesh(geo, mat);
                            scene.add(mesh);
                            remotePlayers[id] = { mesh: mesh };
                        }
                        remotePlayers[id].mesh.position.set(data.x, data.y, data.z);
                    }
                });

                Object.keys(remotePlayers).forEach(id => {
                    if (!playersData[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                    }
                });
            });
        }
    </script>
</body>
</html>
