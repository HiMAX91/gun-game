<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Firebase 3D FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }
        /* 極簡液態玻璃 UI */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
            backdrop-filter: brightness(1.15) contrast(1.1);
            border-top: 1px solid rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            color: #fff; font-family: sans-serif;
            pointer-events: none; z-index: 10;
        }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.8); color: white; z-index: 20; cursor: pointer;
            font-family: sans-serif;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-panel">
        <h3 style="margin:0 0 10px 0; font-weight: 500;">連線狀態</h3>
        <div id="statusText">載入中...</div>
    </div>
    <div id="instructions">
        <h1 style="font-weight: 300;">點擊畫面開始</h1>
        <p style="color: #aaa;">WASD 移動 | 左鍵射擊 | 右鍵瞄準</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ==========================================
        // 1. 全域變數與 3D 核心
        // ==========================================
        let camera, scene, renderer, controls;
        let remotePlayers = {};
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        const raycaster = new THREE.Raycaster();
        let isDead = false;

        let gun;
        let isAiming = false;
        const hipPosition = new THREE.Vector3(0.2, -0.2, -0.4);
        const aimPosition = new THREE.Vector3(0, -0.08, -0.3);

        let db = null;
        let myPlayerRef = null;
        let myUserId = null;
        let isFirebaseReady = false;

        // 確保 3D 畫面優先載入，不受網路影響
        init3D();
        animate();
        initFirebase();

        // ==========================================
        // 2. Three.js 場景設定 (保證畫面能點擊)
        // ==========================================
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            // 純淨液態玻璃槍枝
            const gunGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.5);
            const gunMaterial = new THREE.MeshPhysicalMaterial({
                transmission: 1.0,
                roughness: 0.02,
                ior: 1.5,
                thickness: 0.5,
                color: 0xeeeeee,
                transparent: true
            });
            gun = new THREE.Mesh(gunGeometry, gunMaterial);
            gun.position.copy(hipPosition);
            camera.add(gun);
            scene.add(camera);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 1);
            scene.add(light);

            const floorGeometry = new THREE.PlaneGeometry(100, 100, 20, 20);
            const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');
            
            instructions.addEventListener('click', () => { if(!isDead) controls.lock(); });
            controls.addEventListener('lock', () => instructions.style.display = 'none');
            controls.addEventListener('unlock', () => instructions.style.display = 'flex');
            scene.add(controls.getObject());

            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });

            document.addEventListener('contextmenu', e => e.preventDefault());

            document.addEventListener('mousedown', (e) => {
                if (!controls.isLocked || isDead) return;
                if (e.button === 0) shoot();
                if (e.button === 2) isAiming = true;
            });

            document.addEventListener('mouseup', (e) => {
                if (e.button === 2) isAiming = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ==========================================
        // 3. 防呆 Firebase 初始化 (錯誤攔截)
        // ==========================================
        function initFirebase() {
            try {
                // ⚠️ 這裡請換成你後台真正的設定 ⚠️
                const firebaseConfig = {
                   apiKey: "AIzaSyD1lrv2JndZQQuWFqlMKcskEvT1sELjlno",
                    authDomain: "gun-game-64749.firebaseapp.com",
                    databaseURL: "https://gun-game-64749-default-rtdb.asia-southeast1.firebasedatabase.app",
                    projectId: "gun-game-64749",
                    storageBucket: "gun-game-64749.firebasestorage.app",
                    messagingSenderId: "614674178389",
                    appId: "1:614674178389:web:a86a15aa6b835b6633cfdc"
                };
                
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();

                myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
                myPlayerRef = db.ref('players/' + myUserId);
                
                myPlayerRef.onDisconnect().remove();
                myPlayerRef.set({ x: 0, y: 1.6, z: 0, hp: 100 });

                isFirebaseReady = true;
                listenToPlayers();
            } catch (error) {
                console.error("Firebase 錯誤:", error);
                document.getElementById('statusText').innerHTML = "<span style='color:#f87171;'>資料庫未連線：金鑰設定錯誤</span>";
                alert("Firebase 設定出錯了！請檢查程式碼裡的 firebaseConfig。\n錯誤訊息：" + error.message);
            }
        }

        // ==========================================
        // 4. 核心邏輯與動畫迴圈
        // ==========================================
        function shoot() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targetMeshes = Object.values(remotePlayers).map(p => p.mesh);
            const intersects = raycaster.intersectObjects(targetMeshes);

            if (intersects.length > 0 && isFirebaseReady) {
                const hitMesh = intersects[0].object;
                const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === hitMesh);
                
                if (hitId) {
                    db.ref('players/' + hitId).update({ hp: 0 });
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked && !isDead) {
                const delta = (time - prevTime) / 1000;
                
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                if ((velocity.x !== 0 || velocity.z !== 0) && isFirebaseReady) {
                    myPlayerRef.update({
                        x: controls.getObject().position.x,
                        y: controls.getObject().position.y,
                        z: controls.getObject().position.z
                    });
                }
            }
            
            if (gun) {
                const targetPos = isAiming ? aimPosition : hipPosition;
                gun.position.lerp(targetPos, 0.15);

                const targetFOV = isAiming ? 55 : 75;
                camera.fov += (targetFOV - camera.fov) * 0.15;
                camera.updateProjectionMatrix();
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        // ==========================================
        // 5. 資料庫同步
        // ==========================================
        function listenToPlayers() {
            db.ref('players').on('value', (snapshot) => {
                const playersData = snapshot.val() || {};
                let playerCount = Object.keys(playersData).length;
                
                document.getElementById('statusText').innerHTML = 
                    playerCount >= 2 ? "對手已連線，<span style='color:#4ade80'>準備開火！</span>" : "等待對手...";

                if (playersData[myUserId] && playersData[myUserId].hp <= 0 && !isDead) {
                    isDead = true;
                    controls.unlock();
                    document.getElementById('statusText').innerHTML = "<span style='color:#f87171;'>你被擊殺了...</span>";
                }

                Object.keys(playersData).forEach(id => {
                    if (id === myUserId) return;

                    const data = playersData[id];
                    
                    if (data.hp <= 0 && remotePlayers[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                        document.getElementById('statusText').innerHTML = "<span style='color:#4ade80;'>勝負已分：你贏了！</span>";
                        return;
                    }

                    if (!remotePlayers[id] && data.hp > 0) {
                        const geo = new THREE.BoxGeometry(1, 2, 1);
                        const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
                        const mesh = new THREE.Mesh(geo, mat);
                        scene.add(mesh);
                        remotePlayers[id] = { mesh: mesh };
                    }

                    if (remotePlayers[id] && data.hp > 0) {
                        remotePlayers[id].mesh.position.set(data.x, data.y, data.z);
                    }
                });

                Object.keys(remotePlayers).forEach(id => {
                    if (!playersData[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                    }
                });
            });
        }
    </script>
</body>
</html>
