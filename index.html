<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Web 3D FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            border-top: 1px solid rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px) saturate(150%);
            border-radius: 16px;
            color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            pointer-events: none; z-index: 10;
        }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.7); color: white; z-index: 20; cursor: pointer;
            font-family: sans-serif;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-panel">
        <h2 style="margin:0 0 10px 0; font-weight: 500; letter-spacing: 1px;">狀態區</h2>
        <div id="statusText">等待對手...</div>
    </div>
    <div id="instructions">
        <h1 style="font-weight: 300;">點擊畫面開始</h1>
        <p>WASD 移動 | 滑鼠視角 | 左鍵射擊</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const socket = io();
        let camera, scene, renderer, controls;
        let remotePlayers = {};
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        const raycaster = new THREE.Raycaster();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            scene.fog = new THREE.Fog(0x222222, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // 玩家身高

            // 光源
            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 1);
            light.position.set(0.5, 1, 0.75);
            scene.add(light);

            // 地板
            const floorGeometry = new THREE.PlaneGeometry(100, 100, 10, 10);
            const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x333333, wireframe: true });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 視角控制 (鎖定滑鼠)
            controls = new PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');
            instructions.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => instructions.style.display = 'none');
            controls.addEventListener('unlock', () => instructions.style.display = 'flex');
            scene.add(controls.getObject());

            // 鍵盤監聽
            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });

            // 射擊監聽
            document.addEventListener('mousedown', (e) => {
                if (controls.isLocked && e.button === 0) shoot();
            });

            window.addEventListener('resize', onWindowResize);
        }

        function shoot() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targetMeshes = Object.values(remotePlayers).map(p => p.mesh).filter(m => m);
            const intersects = raycaster.intersectObjects(targetMeshes);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === hitMesh);
                if (hitId) socket.emit('shootHit', hitId);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked) {
                const delta = (time - prevTime) / 1000;
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // 同步位置給伺服器
                socket.emit('playerMovement', {
                    x: controls.getObject().position.x,
                    y: controls.getObject().position.y,
                    z: controls.getObject().position.z
                });
            }
            prevTime = time;
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Socket.io 邏輯 ---
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach(id => {
                if (id !== socket.id) addOtherPlayer(players[id]);
            });
        });

        socket.on('newPlayer', (player) => addOtherPlayer(player));

        socket.on('playerMoved', (player) => {
            if (remotePlayers[player.id] && remotePlayers[player.id].mesh) {
                remotePlayers[player.id].mesh.position.set(player.x, player.y, player.z);
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (remotePlayers[id]) {
                scene.remove(remotePlayers[id].mesh);
                delete remotePlayers[id];
            }
        });

        socket.on('victory', (data) => {
            const status = document.getElementById('statusText');
            if (data.winner === socket.id) {
                status.innerHTML = "<span style='color:#4ade80'>你贏了！首殺達成！</span>";
            } else {
                status.innerHTML = "<span style='color:#f87171'>你被擊殺了...</span>";
            }
            controls.unlock();
        });

        function addOtherPlayer(playerInfo) {
            const geometry = new THREE.BoxGeometry(1, 2, 1);
            const material = new THREE.MeshPhongMaterial({ color: 0xff4444 }); // 敵人是紅色的
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(playerInfo.x, playerInfo.y, playerInfo.z);
            scene.add(mesh);
            remotePlayers[playerInfo.id] = { mesh: mesh };
        }
    </script>
</body>
</html>
