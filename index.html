<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Firebase 3D FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }
        /* 極簡液態玻璃 UI */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
            backdrop-filter: blur(8px) brightness(1.15) contrast(1.1);
            border-top: 1px solid rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            color: #fff; font-family: sans-serif;
            pointer-events: none; z-index: 10;
        }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.8); color: white; z-index: 20; cursor: pointer;
            font-family: sans-serif;
        }
        
        /* 觸控虛擬按鍵 (手機版專用) */
        #mobile-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 30; display: none; /* 預設隱藏，偵測到手機才開啟 */
        }
        .touch-btn {
            position: absolute; background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
            color: white; display: flex; justify-content: center; align-items: center;
            pointer-events: auto; user-select: none; backdrop-filter: blur(4px); font-family: sans-serif; font-size: 14px;
        }
        .touch-btn:active { background: rgba(255,255,255,0.3); }
        
        /* 左側方向鍵 */
        #btn-up { bottom: 130px; left: 80px; width: 60px; height: 60px; }
        #btn-down { bottom: 30px; left: 80px; width: 60px; height: 60px; }
        #btn-left { bottom: 80px; left: 20px; width: 60px; height: 60px; }
        #btn-right { bottom: 80px; left: 140px; width: 60px; height: 60px; }
        
        /* 右側動作鍵 */
        #btn-shoot { bottom: 60px; right: 80px; width: 80px; height: 80px; font-size: 18px; font-weight: bold; border-color: rgba(248, 113, 113, 0.6); }
        #btn-jump { bottom: 30px; right: 180px; width: 60px; height: 60px; }
        #btn-switch { bottom: 160px; right: 60px; width: 60px; height: 60px; }
        
        /* 右半邊視角滑動區 */
        #touch-look-zone {
            position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-panel">
        <h3 style="margin:0 0 10px 0; font-weight: 500;">連線狀態</h3>
        <div id="statusText">載入中...</div>
        <div id="weaponStatus" style="margin-top: 10px; font-size: 14px; color: #ccc;">
            武器：<span style='color:#60a5fa;'>槍</span>
        </div>
    </div>
    
    <div id="instructions">
        <h1 style="font-weight: 300;" id="start-text">點擊畫面開始</h1>
        <p style="color: #aaa;" id="sub-text">WASD 移動 | 左鍵 攻擊 | 1/2 切換武器</p>
    </div>

    <div id="mobile-controls">
        <div id="touch-look-zone"></div>
        <div id="btn-up" class="touch-btn">W</div>
        <div id="btn-down" class="touch-btn">S</div>
        <div id="btn-left" class="touch-btn">A</div>
        <div id="btn-right" class="touch-btn">D</div>
        <div id="btn-shoot" class="touch-btn">攻擊</div>
        <div id="btn-jump" class="touch-btn">跳</div>
        <div id="btn-switch" class="touch-btn">換武器</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        let remotePlayers = {};
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        const raycaster = new THREE.Raycaster();
        let isDead = false;

        let gun, knife;
        let currentWeapon = 'gun';
        let isAiming = false;
        let isSlashing = false;
        const hipPosition = new THREE.Vector3(0.2, -0.2, -0.4);
        const aimPosition = new THREE.Vector3(0, -0.08, -0.3);

        let db = null;
        let myPlayerRef = null;
        let myUserId = null;
        let isFirebaseReady = false;

        // 判斷是否為手機裝置
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);

        init3D();
        animate();
        initFirebase();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            const glassMaterial = new THREE.MeshPhysicalMaterial({
                transmission: 1.0, roughness: 0.02, ior: 1.5, thickness: 0.5, color: 0xeeeeee, transparent: true
            });

            // 武器 A：槍
            gun = new THREE.Group();
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.4), glassMaterial);
            barrel.position.set(0, 0.05, -0.1); 
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.15, 0.08), glassMaterial);
            handle.position.set(0, -0.05, 0.05); 
            handle.rotation.x = Math.PI / 8;
            gun.add(barrel);
            gun.add(handle);
            gun.position.copy(hipPosition);
            camera.add(gun);

            // 武器 B：刀
            knife = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.06, 0.35), glassMaterial);
            blade.position.set(0, 0, -0.2); 
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.02), glassMaterial);
            guard.position.set(0, 0, -0.02); 
            const knifeHandle = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.04, 0.15), glassMaterial);
            knifeHandle.position.set(0, 0, 0.06); 
            knife.add(blade);
            knife.add(guard);
            knife.add(knifeHandle);
            knife.position.copy(hipPosition);
            knife.visible = false; 
            camera.add(knife);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 1);
            scene.add(light);

            const gridHelper = new THREE.GridHelper(100, 50, 0xffffff, 0x333333);
            scene.add(gridHelper);

            const obstacleGeo = new THREE.BoxGeometry(4, 4, 4);
            const obstacleMat = new THREE.MeshPhysicalMaterial({ 
                color: 0xeeeeee, transmission: 0.9, ior: 1.5, transparent: true, roughness: 0.1 
            });
            for(let i = 0; i < 15; i++) {
                const box = new THREE.Mesh(obstacleGeo, obstacleMat);
                box.position.set((Math.random() - 0.5) * 60, 2, (Math.random() - 0.5) * 60);
                scene.add(box);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');

            if (isMobile) {
                // 手機版：隱藏進入畫面，顯示虛擬按鍵
                instructions.style.display = 'none';
                document.getElementById('mobile-controls').style.display = 'block';
                setupMobileControls();
            } else {
                // 電腦版：使用滑鼠鎖定與鍵盤
                instructions.addEventListener('click', () => { if(!isDead) controls.lock(); });
                controls.addEventListener('lock', () => instructions.style.display = 'none');
                controls.addEventListener('unlock', () => instructions.style.display = 'flex');
            }
            scene.add(controls.getObject());

            // 電腦版按鍵監聽
            document.addEventListener('keydown', (e) => {
                if(isMobile) return;
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump === true) velocity.y += 350; canJump = false; break;
                    case 'Digit1': switchWeapon('gun'); break;
                    case 'Digit2': switchWeapon('knife'); break;
                }
            });
            document.addEventListener('keyup', (e) => {
                if(isMobile) return;
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });

            document.addEventListener('contextmenu', e => e.preventDefault());

            document.addEventListener('mousedown', (e) => {
                if (isMobile || !controls.isLocked || isDead) return;
                if (e.button === 0) performAttack();
                if (e.button === 2 && currentWeapon === 'gun') isAiming = true;
            });
            document.addEventListener('mouseup', (e) => {
                if (isMobile) return;
                if (e.button === 2) isAiming = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- 手機觸控邏輯設定 ---
        function setupMobileControls() {
            const bindBtn = (id, setTrue, setFalse) => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setTrue(); });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); setFalse(); });
            };

            bindBtn('btn-up', () => moveForward = true, () => moveForward = false);
            bindBtn('btn-down', () => moveBackward = true, () => moveBackward = false);
            bindBtn('btn-left', () => moveLeft = true, () => moveLeft = false);
            bindBtn('btn-right', () => moveRight = true, () => moveRight = false);

            document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
                e.preventDefault();
                performAttack();
            });

            document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (canJump) velocity.y += 350;
                canJump = false;
            });

            document.getElementById('btn-switch').addEventListener('touchstart', (e) => {
                e.preventDefault();
                switchWeapon(currentWeapon === 'gun' ? 'knife' : 'gun');
            });

            // 視角滑動邏輯
            const lookZone = document.getElementById('touch-look-zone');
            let touchStartX = 0, touchStartY = 0;
            const euler = new THREE.Euler(0, 0, 0, 'YXZ');

            lookZone.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].pageX;
                touchStartY = e.touches[0].pageY;
            });

            lookZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const movementX = e.touches[0].pageX - touchStartX;
                const movementY = e.touches[0].pageY - touchStartY;
                touchStartX = e.touches[0].pageX;
                touchStartY = e.touches[0].pageY;

                euler.setFromQuaternion(camera.quaternion);
                euler.y -= movementX * 0.005; // 左右靈敏度
                euler.x -= movementY * 0.005; // 上下靈敏度
                euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, euler.x)); // 限制上下視角
                camera.quaternion.setFromEuler(euler);
            });
        }

        function switchWeapon(type) {
            currentWeapon = type;
            if (type === 'gun') {
                gun.visible = true; knife.visible = false;
                document.getElementById('weaponStatus').innerHTML = "武器：<span style='color:#60a5fa;'>槍</span>";
            } else {
                gun.visible = false; knife.visible = true; isAiming = false;
                document.getElementById('weaponStatus').innerHTML = "武器：<span style='color:#f87171;'>刀</span>";
            }
        }

        function performAttack() {
            if (currentWeapon === 'gun') {
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                let targetMeshes = Object.values(remotePlayers).map(p => p.mesh);
                const intersects = raycaster.intersectObjects(targetMeshes);
                if (intersects.length > 0 && isFirebaseReady) {
                    const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === intersects[0].object);
                    if (hitId) db.ref('players/' + hitId).update({ hp: 0 });
                }
            } else if (currentWeapon === 'knife') {
                if (isSlashing) return;
                isSlashing = true;
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                let targetMeshes = Object.values(remotePlayers).map(p => p.mesh);
                const intersects = raycaster.intersectObjects(targetMeshes);
                if (intersects.length > 0 && intersects[0].distance < 4 && isFirebaseReady) {
                    const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === intersects[0].object);
                    if (hitId) db.ref('players/' + hitId).update({ hp: 0 });
                }
                setTimeout(() => { isSlashing = false; }, 300);
            }
        }

        function initFirebase() {
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyD1lrv2JndZQQuWFqlMKcskEvT1sELjlno",
                    authDomain: "gun-game-64749.firebaseapp.com",
                    databaseURL: "https://gun-game-64749-default-rtdb.asia-southeast1.firebasedatabase.app",
                    projectId: "gun-game-64749",
                    storageBucket: "gun-game-64749.firebasestorage.app",
                    messagingSenderId: "614674178389",
                    appId: "1:614674178389:web:a86a15aa6b835b6633cfdc"
                };
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
                myPlayerRef = db.ref('players/' + myUserId);
                myPlayerRef.onDisconnect().remove();
                myPlayerRef.set({ x: 0, y: 1.6, z: 0, hp: 100 });
                isFirebaseReady = true;
                listenToPlayers();
            } catch (error) {
                console.error("Firebase 錯誤:", error);
                document.getElementById('statusText').innerHTML = "<span style='color:#f87171;'>資料庫連線失敗</span>";
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            // 相容電腦版鎖定或手機版開啟
            if ((controls.isLocked || isMobile) && !isDead) {
                const delta = (time - prevTime) / 1000;
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                controls.getObject().position.y += (velocity.y * delta);
                if (controls.getObject().position.y < 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true; 
                }

                if ((velocity.x !== 0 || velocity.y !== 0 || velocity.z !== 0) && isFirebaseReady) {
                    myPlayerRef.update({
                        x: controls.getObject().position.x,
                        y: controls.getObject().position.y,
                        z: controls.getObject().position.z
                    });
                }
            }

            if (currentWeapon === 'gun') {
                const targetPos = isAiming ? aimPosition : hipPosition;
                gun.position.lerp(targetPos, 0.15);
                const targetFOV = isAiming ? 55 : 75;
                camera.fov += (targetFOV - camera.fov) * 0.15;
            } else if (currentWeapon === 'knife') {
                camera.fov += (75 - camera.fov) * 0.15;
                if (isSlashing) {
                    knife.position.lerp(new THREE.Vector3(0, -0.1, -0.6), 0.4);
                    knife.rotation.x = THREE.MathUtils.lerp(knife.rotation.x, -0.5, 0.4);
                } else {
                    knife.position.lerp(hipPosition, 0.15);
                    knife.rotation.x = THREE.MathUtils.lerp(knife.rotation.x, 0, 0.15);
                }
            }
            camera.updateProjectionMatrix();

            prevTime = time;
            renderer.render(scene, camera);
        }

        function listenToPlayers() {
            db.ref('players').on('value', (snapshot) => {
                const playersData = snapshot.val() || {};
                let playerCount = Object.keys(playersData).length;

                document.getElementById('statusText').innerHTML =
                    playerCount >= 2 ? "對手已連線，<span style='color:#4ade80'>準備開戰！</span>" : "等待對手...";

                if (playersData[myUserId] && playersData[myUserId].hp <= 0 && !isDead) {
                    isDead = true;
                    if(!isMobile) controls.unlock();
                    document.getElementById('statusText').innerHTML = "<span style='color:#f87171;'>你被擊殺了...</span>";
                }

                Object.keys(playersData).forEach(id => {
                    if (id === myUserId) return;
                    const data = playersData[id];

                    if (data.hp <= 0 && remotePlayers[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                        document.getElementById('statusText').innerHTML = "<span style='color:#4ade80;'>勝負已分：你贏了！</span>";
                        return;
                    }

                    if (!remotePlayers[id] && data.hp > 0) {
                        const geo = new THREE.BoxGeometry(1, 2, 1);
                        const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
                        const mesh = new THREE.Mesh(geo, mat);
                        scene.add(mesh);
                        remotePlayers[id] = { mesh: mesh };
                    }

                    if (remotePlayers[id] && data.hp > 0) {
                        remotePlayers[id].mesh.position.set(data.x, data.y, data.z);
                    }
                });

                Object.keys(remotePlayers).forEach(id => {
                    if (!playersData[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                    }
                });
            });
        }
    </script>
</body>
</html>
