<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Firebase 3D FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }
        /* 極簡液態玻璃 UI */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
            backdrop-filter: blur(8px) brightness(1.15) contrast(1.1);
            border-top: 1px solid rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            color: #fff; font-family: sans-serif;
            pointer-events: none; z-index: 10;
        }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.8); color: white; z-index: 20; cursor: pointer;
            font-family: sans-serif;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-panel">
        <h3 style="margin:0 0 10px 0; font-weight: 500;">連線狀態</h3>
        <div id="statusText">載入中...</div>
        <div id="weaponStatus" style="margin-top: 10px; font-size: 14px; color: #ccc;">
            武器：<span style='color:#60a5fa;'>槍 (按 2 切換)</span>
        </div>
    </div>
    <div id="instructions">
        <h1 style="font-weight: 300;">點擊畫面開始</h1>
        <p style="color: #aaa;">WASD 移動 | 空白鍵 跳躍 | 左鍵 攻擊 | 右鍵 瞄準 (僅限槍) | 按 1/2 切換武器</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ==========================================
        // 1. 全域變數
        // ==========================================
        let camera, scene, renderer, controls;
        let remotePlayers = {};
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        const raycaster = new THREE.Raycaster();
        let isDead = false;

        // 武器系統變數
        let gun, knife;
        let currentWeapon = 'gun'; // 預設拿槍
        let isAiming = false;
        let isSlashing = false; // 揮刀判定
        const hipPosition = new THREE.Vector3(0.2, -0.2, -0.4);
        const aimPosition = new THREE.Vector3(0, -0.08, -0.3);

        // Firebase 變數
        let db = null;
        let myPlayerRef = null;
        let myUserId = null;
        let isFirebaseReady = false;

        init3D();
        animate();
        initFirebase();

        // ==========================================
        // 2. 3D 場景與武器設定
        // ==========================================
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            // --- 共用：純淨液態玻璃材質 ---
            const glassMaterial = new THREE.MeshPhysicalMaterial({
                transmission: 1.0,
                roughness: 0.02,
                ior: 1.5, // 高折射率
                thickness: 0.5,
                color: 0xeeeeee,
                transparent: true
            });

            // 武器 A：槍
            const gunGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.5);
            gun = new THREE.Mesh(gunGeometry, glassMaterial);
            gun.position.copy(hipPosition);
            camera.add(gun);

            // 武器 B：刀 (細長扁平)
            const knifeGeometry = new THREE.BoxGeometry(0.02, 0.08, 0.4);
            knife = new THREE.Mesh(knifeGeometry, glassMaterial);
            knife.position.copy(hipPosition);
            knife.visible = false; // 預設先隱藏刀
            camera.add(knife);

            scene.add(camera);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 1);
            scene.add(light);

            // 高對比網格地板
            const gridHelper = new THREE.GridHelper(100, 50, 0xffffff, 0x333333);
            scene.add(gridHelper);

            // 隨機生成 15 個高透光玻璃障礙物
            const obstacleGeo = new THREE.BoxGeometry(4, 4, 4);
            const obstacleMat = new THREE.MeshPhysicalMaterial({ 
                color: 0xeeeeee, transmission: 0.9, ior: 1.5, transparent: true, roughness: 0.1 
            });
            for(let i = 0; i < 15; i++) {
                const box = new THREE.Mesh(obstacleGeo, obstacleMat);
                box.position.set((Math.random() - 0.5) * 60, 2, (Math.random() - 0.5) * 60);
                scene.add(box);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');

            instructions.addEventListener('click', () => { if(!isDead) controls.lock(); });
            controls.addEventListener('lock', () => instructions.style.display = 'none');
            controls.addEventListener('unlock', () => instructions.style.display = 'flex');
            scene.add(controls.getObject());

            // 鍵盤監聽：移動與切換武器
            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': 
                        if (canJump === true) velocity.y += 350;
                        canJump = false;
                        break;
                    case 'Digit1': // 切換成槍
                        currentWeapon = 'gun';
                        gun.visible = true;
                        knife.visible = false;
                        document.getElementById('weaponStatus').innerHTML = "武器：<span style='color:#60a5fa;'>槍 (按 2 切換)</span>";
                        break;
                    case 'Digit2': // 切換成刀
                        currentWeapon = 'knife';
                        gun.visible = false;
                        knife.visible = true;
                        isAiming = false; // 強制取消瞄準狀態
                        document.getElementById('weaponStatus').innerHTML = "武器：<span style='color:#f87171;'>刀 (按 1 切換)</span>";
                        break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });

            document.addEventListener('contextmenu', e => e.preventDefault());

            // 滑鼠攻擊判定
            document.addEventListener('mousedown', (e) => {
                if (!controls.isLocked || isDead) return;
                
                if (e.button === 0) {
                    if (currentWeapon === 'gun') shoot();
                    if (currentWeapon === 'knife') slash();
                }
                
                if (e.button === 2 && currentWeapon === 'gun') {
                    isAiming = true;
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (e.button === 2) isAiming = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ==========================================
        // 3. Firebase 初始化
        // ==========================================
        function initFirebase() {
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyD1lrv2JndZQQuWFqlMKcskEvT1sELjlno",
                    authDomain: "gun-game-64749.firebaseapp.com",
                    databaseURL: "https://gun-game-64749-default-rtdb.asia-southeast1.firebasedatabase.app",
                    projectId: "gun-game-64749",
                    storageBucket: "gun-game-64749.firebasestorage.app",
                    messagingSenderId: "614674178389",
                    appId: "1:614674178389:web:a86a15aa6b835b6633cfdc"
                };

                firebase.initializeApp(firebaseConfig);
                db = firebase.database();

                myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
                myPlayerRef = db.ref('players/' + myUserId);

                myPlayerRef.onDisconnect().remove();
                myPlayerRef.set({ x: 0, y: 1.6, z: 0, hp: 100 });

                isFirebaseReady = true;
                listenToPlayers();
            } catch (error) {
                console.error("Firebase 錯誤:", error);
                document.getElementById('statusText').innerHTML = "<span style='color:#f87171;'>資料庫連線失敗</span>";
            }
        }

        // ==========================================
        // 4. 武器邏輯：開槍與揮刀
        // ==========================================
        function shoot() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targetMeshes = Object.values(remotePlayers).map(p => p.mesh);
            const intersects = raycaster.intersectObjects(targetMeshes);

            // 槍：無距離限制
            if (intersects.length > 0 && isFirebaseReady) {
                const hitMesh = intersects[0].object;
                const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === hitMesh);
                if (hitId) db.ref('players/' + hitId).update({ hp: 0 });
            }
        }

        function slash() {
            if (isSlashing) return;
            isSlashing = true;

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            let targetMeshes = Object.values(remotePlayers).map(p => p.mesh);
            const intersects = raycaster.intersectObjects(targetMeshes);

            // 刀：距離必須小於 4 才能擊殺
            if (intersects.length > 0 && intersects[0].distance < 4 && isFirebaseReady) {
                const hitMesh = intersects[0].object;
                const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === hitMesh);
                if (hitId) db.ref('players/' + hitId).update({ hp: 0 });
            }

            // 0.3 秒後恢復，允許再次揮刀
            setTimeout(() => { isSlashing = false; }, 300);
        }

        // ==========================================
        // 5. 動畫迴圈 (移動與武器動態)
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked && !isDead) {
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // 重力

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // 跳躍碰撞判定
                controls.getObject().position.y += (velocity.y * delta);
                if (controls.getObject().position.y < 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true; 
                }

                if ((velocity.x !== 0 || velocity.y !== 0 || velocity.z !== 0) && isFirebaseReady) {
                    myPlayerRef.update({
                        x: controls.getObject().position.x,
                        y: controls.getObject().position.y,
                        z: controls.getObject().position.z
                    });
                }
            }

            // 武器切換與動作動畫
            if (currentWeapon === 'gun') {
                const targetPos = isAiming ? aimPosition : hipPosition;
                gun.position.lerp(targetPos, 0.15);

                const targetFOV = isAiming ? 55 : 75;
                camera.fov += (targetFOV - camera.fov) * 0.15;
            } else if (currentWeapon === 'knife') {
                camera.fov += (75 - camera.fov) * 0.15; // 拿刀不縮放視角

                if (isSlashing) {
                    // 往前刺擊
                    knife.position.lerp(new THREE.Vector3(0, -0.1, -0.6), 0.4);
                    knife.rotation.x = THREE.MathUtils.lerp(knife.rotation.x, -0.5, 0.4);
                } else {
                    // 收回原位
                    knife.position.lerp(hipPosition, 0.15);
                    knife.rotation.x = THREE.MathUtils.lerp(knife.rotation.x, 0, 0.15);
                }
            }
            camera.updateProjectionMatrix();

            prevTime = time;
            renderer.render(scene, camera);
        }

        // ==========================================
        // 6. 資料庫監聽
        // ==========================================
        function listenToPlayers() {
            db.ref('players').on('value', (snapshot) => {
                const playersData = snapshot.val() || {};
                let playerCount = Object.keys(playersData).length;

                document.getElementById('statusText').innerHTML =
                    playerCount >= 2 ? "對手已連線，<span style='color:#4ade80'>準備開火！</span>" : "等待對手...";

                if (playersData[myUserId] && playersData[myUserId].hp <= 0 && !isDead) {
                    isDead = true;
                    controls.unlock();
                    document.getElementById('statusText').innerHTML = "<span style='color:#f87171;'>你被擊殺了...</span>";
                }

                Object.keys(playersData).forEach(id => {
                    if (id === myUserId) return;

                    const data = playersData[id];

                    if (data.hp <= 0 && remotePlayers[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                        document.getElementById('statusText').innerHTML = "<span style='color:#4ade80;'>勝負已分：你贏了！</span>";
                        return;
                    }

                    if (!remotePlayers[id] && data.hp > 0) {
                        const geo = new THREE.BoxGeometry(1, 2, 1);
                        const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
                        const mesh = new THREE.Mesh(geo, mat);
                        scene.add(mesh);
                        remotePlayers[id] = { mesh: mesh };
                    }

                    if (remotePlayers[id] && data.hp > 0) {
                        remotePlayers[id].mesh.position.set(data.x, data.y, data.z);
                    }
                });

                Object.keys(remotePlayers).forEach(id => {
                    if (!playersData[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        delete remotePlayers[id];
                    }
                });
            });
        }
    </script>
</body>
</html>
