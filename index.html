<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Firebase 3D FPS - 特戰英豪手感版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* 特戰動態準星 */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 30px; height: 30px; pointer-events: none; z-index: 10;
            transform: translate(-50%, -50%);
        }
        .ch-line {
            position: absolute; background: #00ff00;
            transition: all 0.05s ease-out;
        }
        .ch-top { top: 13px; left: 14px; width: 2px; height: 6px; transform: translateY(-8px); }
        .ch-bottom { bottom: 13px; left: 14px; width: 2px; height: 6px; transform: translateY(8px); }
        .ch-left { left: 13px; top: 14px; width: 6px; height: 2px; transform: translateX(-8px); }
        .ch-right { right: 13px; top: 14px; width: 6px; height: 2px; transform: translateX(8px); }

        /* 極簡液態玻璃 UI */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
            backdrop-filter: blur(4px) brightness(1.15) contrast(1.1);
            border-top: 1px solid rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            color: #fff; font-family: sans-serif;
            pointer-events: none; z-index: 10; min-width: 200px;
        }
        #hp-container {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 4px; margin-top: 15px; overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        #hp-bar {
            width: 100%; height: 100%; background: #4ade80;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.8); color: white; z-index: 20; cursor: pointer;
            font-family: sans-serif;
        }
        .key-hint { color: #4ade80; font-weight: bold; padding: 0 5px; }
        .skill-hint { color: #00aaff; font-weight: bold; padding: 0 5px; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="crosshair">
        <div class="ch-line ch-top" id="ch-top"></div>
        <div class="ch-line ch-bottom" id="ch-bottom"></div>
        <div class="ch-line ch-left" id="ch-left"></div>
        <div class="ch-line ch-right" id="ch-right"></div>
    </div>
    
    <div id="ui-panel">
        <h3 style="margin:0 0 10px 0; font-weight: 500; font-size: 16px;">連線狀態</h3>
        <div id="statusText" style="font-size: 14px; margin-bottom: 10px;">系統初始化中...</div>
        <div style="font-size: 12px; color: #ccc;">生命值 (HP)</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div style="margin-top: 15px; font-size: 12px; color: #ccc;">
            武器：<span id="weaponText" style="color: #fff; font-weight: bold;">突擊步槍</span>
        </div>
        <div style="margin-top: 5px; font-size: 12px; color: #ccc;">
            瞬風 (Dash)：<span id="dashText" style="color: #00aaff; font-weight: bold;">就緒</span>
        </div>
    </div>
    
    <div id="instructions">
        <h1 style="font-weight: 300; letter-spacing: 2px;">點擊畫面開始</h1>
        <p style="color: #bbb; margin-top: 20px;">
            WASD 移動 | 空白鍵 跳躍 | 左鍵 射擊<br><br>
            按 <span class="key-hint">1</span> 步槍 | 按 <span class="key-hint">2</span> 戰術刀 | 按 <span class="skill-hint">E</span> 瞬風衝刺
        </p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ==========================================
        // 1. Firebase 初始化
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD1lrv2JndZQQuWFqlMKcskEvT1sELjlno",
            authDomain: "gun-game-64749.firebaseapp.com",
            databaseURL: "https://gun-game-64749-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gun-game-64749",
            storageBucket: "gun-game-64749.firebasestorage.app",
            messagingSenderId: "614674178389",
            appId: "1:614674178389:web:a86a15aa6b835b6633cfdc",
            measurementId: "G-YJ4WRL03ZX"
        };

        let db = null, myUserId = null, myPlayerRef = null;

        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            myUserId = 'user_' + Math.random().toString(36).substr(2, 9);
            myPlayerRef = db.ref('players/' + myUserId);
            myPlayerRef.onDisconnect().remove();
            myPlayerRef.set({ x: 0, y: 1.6, z: 0, hp: 100 });
            document.getElementById('statusText').innerHTML = "連線成功";
        } catch (error) {
            document.getElementById('statusText').innerHTML = "<span style='color:#fbd38d;'>離線測試模式</span>";
        }

        // ==========================================
        // 2. Three.js 場景與變數
        // ==========================================
        let camera, scene, renderer, controls;
        let remotePlayers = {};
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        const raycaster = new THREE.Raycaster();
        let isDead = false;

        // 技能與動畫變數
        let weaponContainer = new THREE.Group();
        let gunGroup, knifeGroup;
        let currentWeapon = 'gun'; 
        let currentRecoil = 0; 
        let isSwinging = false;
        let swingProgress = 0;
        
        // 特戰機制變數
        let crosshairSpread = 0; // 準星擴散度
        let lastDashTime = 0;    // 衝刺冷卻

        init3D();
        animate();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            scene.fog = new THREE.FogExp2(0x222222, 0.015); 
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444455, 0.6);
            scene.add(hemiLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            const floorGeometry = new THREE.PlaneGeometry(200, 200, 40, 40);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8, metalness: 0.2 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const boxGeo = new THREE.BoxGeometry(2, 2, 2);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7 });
            for(let i=0; i<15; i++) {
                let box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set((Math.random() - 0.5) * 60, 1, (Math.random() - 0.5) * 60);
                scene.add(box);
            }

            // 武器模型建立
            gunGroup = new THREE.Group();
            const gunBodyMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.7, roughness: 0.4 });
            const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.45), gunBodyMat);
            gunGroup.add(gunBody);
            const barrelMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.3, 16), barrelMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.set(0, 0.03, -0.35);
            gunGroup.add(barrel);
            const sightMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x00aaff, emissiveIntensity: 2 });
            const sight = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.04), sightMat);
            sight.position.set(0, 0.07, -0.1);
            gunGroup.add(sight);

            knifeGroup = new THREE.Group();
            const bladeMat = new THREE.MeshPhysicalMaterial({ color: 0xdddddd, metalness: 1.0, roughness: 0.1, clearcoat: 1.0 });
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.06, 0.35), bladeMat);
            blade.position.set(0, 0, -0.2);
            blade.geometry.attributes.position.setY(0, 0.01); 
            blade.geometry.attributes.position.setY(1, 0.01);
            knifeGroup.add(blade);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.15, 8), handleMat);
            handle.rotation.x = Math.PI / 2;
            handle.position.set(0, 0, 0.05);
            knifeGroup.add(handle);
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, 0.02), gunBodyMat);
            guard.position.set(0, 0, -0.03);
            knifeGroup.add(guard);

            weaponContainer.add(gunGroup);
            weaponContainer.add(knifeGroup);
            weaponContainer.position.set(0.25, -0.25, -0.4);
            camera.add(weaponContainer);
            scene.add(camera);
            
            switchWeapon('gun');

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');
            
            instructions.addEventListener('click', () => { if(!isDead) controls.lock(); });
            controls.addEventListener('lock', () => instructions.style.display = 'none');
            controls.addEventListener('unlock', () => instructions.style.display = 'flex');
            scene.add(controls.getObject());

            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump === true && !isDead) velocity.y += 120; canJump = false; break;
                    case 'Digit1': switchWeapon('gun'); break;
                    case 'Digit2': switchWeapon('knife'); break;
                    // 【捷風瞬風技能】
                    case 'KeyE': 
                        if (performance.now() - lastDashTime > 3000 && !isDead) {
                            dash(); 
                        }
                        break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });

            document.addEventListener('mousedown', (e) => {
                if (controls.isLocked && e.button === 0 && !isDead) attack();
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function switchWeapon(type) {
            currentWeapon = type;
            if (type === 'gun') {
                gunGroup.visible = true; knifeGroup.visible = false;
                document.getElementById('weaponText').innerText = "突擊步槍";
                weaponContainer.position.set(0.25, -0.25, -0.4);
                weaponContainer.rotation.set(0, 0, 0);
            } else if (type === 'knife') {
                gunGroup.visible = false; knifeGroup.visible = true;
                document.getElementById('weaponText').innerText = "戰術小刀";
                weaponContainer.position.set(0.15, -0.2, -0.3);
                weaponContainer.rotation.set(-Math.PI / 6, Math.PI / 8, 0); 
            }
        }

        function dash() {
            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();
            
            // 如果原地按 E，預設往前衝
            if (direction.x === 0 && direction.z === 0) direction.z = 1;
            
            // 瞬間給予極大速度
            velocity.x -= direction.x * 2000.0;
            velocity.z -= direction.z * 2000.0;
            
            lastDashTime = performance.now();
            document.getElementById('dashText').innerHTML = "<span style='color:#facc15;'>冷卻中...</span>";
            
            setTimeout(() => {
                document.getElementById('dashText').innerHTML = "<span style='color:#00aaff; font-weight:bold;'>就緒</span>";
            }, 3000);
        }

        // ==========================================
        // 3. 攻擊與急停隨機彈道
        // ==========================================
        function attack() {
            if (currentWeapon === 'gun') {
                currentRecoil = 0.15;
                // 開槍也會造成準星擴散
                crosshairSpread += 15; 
                
                // 【彈道隨機偏移】：走動或跳躍時，子彈會亂飄
                let currentError = (crosshairSpread / 100) * 0.1;
                let randomX = (Math.random() - 0.5) * currentError;
                let randomY = (Math.random() - 0.5) * currentError;
                
                let dir = new THREE.Vector3(randomX, randomY, -1).unproject(camera).sub(camera.position).normalize();
                raycaster.set(camera.position, dir);
                raycaster.far = 1000; 
                checkHit(35); 
                
            } else if (currentWeapon === 'knife') {
                if(isSwinging) return; 
                isSwinging = true;
                swingProgress = 0;
                
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                raycaster.far = 4; 
                checkHit(50); 
            }
        }

        function checkHit(damage) {
            let targetMeshes = Object.values(remotePlayers).map(p => p.mesh);
            const intersects = raycaster.intersectObjects(targetMeshes);
            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const hitId = Object.keys(remotePlayers).find(id => remotePlayers[id].mesh === hitMesh);
                if (hitId && db) {
                    db.ref('players/' + hitId).once('value').then(snap => {
                        let hp = snap.val().hp;
                        if(hp > 0) db.ref('players/' + hitId).update({ hp: Math.max(0, hp - damage) });
                    });
                }
            }
        }

        // ==========================================
        // 4. 動畫、物理與 UI 更新
        // ==========================================
        function updateCrosshair(speed) {
            // 基礎擴散度 + 速度造成的擴散
            let targetSpread = (speed / 10) + (canJump ? 0 : 20); 
            
            // 讓擴散度平滑過渡
            crosshairSpread = THREE.MathUtils.lerp(crosshairSpread, targetSpread, 0.1);
            
            // 最大擴散限制
            if(crosshairSpread > 40) crosshairSpread = 40;
            
            document.getElementById('ch-top').style.transform = `translateY(${-8 - crosshairSpread}px)`;
            document.getElementById('ch-bottom').style.transform = `translateY(${8 + crosshairSpread}px)`;
            document.getElementById('ch-left').style.transform = `translateX(${-8 - crosshairSpread}px)`;
            document.getElementById('ch-right').style.transform = `translateX(${8 + crosshairSpread}px)`;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked && !isDead) {
                const delta = (time - prevTime) / 1000;
                
                if (currentWeapon === 'gun') {
                    currentRecoil = THREE.MathUtils.lerp(currentRecoil, 0, 0.15);
                    weaponContainer.position.z = -0.4 + currentRecoil; 
                    weaponContainer.rotation.x = currentRecoil * 0.8; 
                } else if (currentWeapon === 'knife') {
                    if (isSwinging) {
                        swingProgress += delta * 15; 
                        if (swingProgress < 1) {
                            weaponContainer.position.z = -0.3 - (Math.sin(swingProgress * Math.PI) * 0.2);
                            weaponContainer.rotation.x = (-Math.PI / 6) - (Math.sin(swingProgress * Math.PI) * 0.5);
                        } else {
                            isSwinging = false;
                            weaponContainer.position.z = -0.3;
                            weaponContainer.rotation.x = -Math.PI / 6;
                        }
                    }
                }

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 60.0 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 150.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 150.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true; 
                }

                // 計算當前真實速度，用於更新十字準星
                let currentSpeed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
                updateCrosshair(currentSpeed);

                if (db && (Math.abs(velocity.x) > 0.1 || Math.abs(velocity.z) > 0.1 || Math.abs(velocity.y) > 0.1)) {
                    myPlayerRef.update({
                        x: controls.getObject().position.x,
                        y: controls.getObject().position.y,
                        z: controls.getObject().position.z
                    });
                }
            }
            prevTime = time;
            renderer.render(scene, camera);
        }

        // ==========================================
        // 5. Firebase UI 更新
        // ==========================================
        if (db) {
            db.ref('players').on('value', (snapshot) => {
                const playersData = snapshot.val() || {};
                let playerCount = Object.keys(playersData).length;
                if(!isDead) {
                    document.getElementById('statusText').innerHTML = 
                        playerCount >= 2 ? "對手已連線，<span style='color:#4ade80'>戰鬥開始</span>" : "等待對手加入...";
                }
                if (playersData[myUserId]) {
                    let hp = playersData[myUserId].hp;
                    document.getElementById('hp-bar').style.width = hp + '%';
                    document.getElementById('hp-bar').style.background = hp > 50 ? '#4ade80' : (hp > 25 ? '#facc15' : '#f87171');
                    
                    if (hp <= 0 && !isDead) {
                        isDead = true; controls.unlock();
                        document.getElementById('statusText').innerHTML = "<span style='color:#f87171;'>你被擊殺了！</span>";
                        document.getElementById('instructions').innerHTML = "<h1 style='color:#f87171'>YOU DIED</h1><p>請重新整理網頁</p>";
                    }
                }
                Object.keys(playersData).forEach(id => {
                    if (id === myUserId) return;
                    const data = playersData[id];
                    if (data.hp <= 0 && remotePlayers[id]) {
                        scene.remove(remotePlayers[id].mesh); delete remotePlayers[id];
                        if(!isDead) document.getElementById('statusText').innerHTML = "<span style='color:#4ade80;'>擊殺敵人！</span>";
                        return;
                    }
                    if (data.hp > 0) {
                        if (!remotePlayers[id]) {
                            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0xff4444, metalness: 0.3, roughness: 0.5 }));
                            scene.add(mesh); remotePlayers[id] = { mesh: mesh };
                        }
                        remotePlayers[id].mesh.position.set(data.x, data.y, data.z);
                    }
                });
                Object.keys(remotePlayers).forEach(id => {
                    if (!playersData[id]) { scene.remove(remotePlayers[id].mesh); delete remotePlayers[id]; }
                });
            });
        }
    </script>
</body>
</html>
